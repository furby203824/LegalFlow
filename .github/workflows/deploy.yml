name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_GH_OWNER: ${{ secrets.VITE_GITHUB_OWNER }}
          NEXT_PUBLIC_GH_REPO: ${{ secrets.VITE_GITHUB_REPO }}
          NEXT_PUBLIC_GH_BRANCH: main
          NEXT_PUBLIC_GH_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
