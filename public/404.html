<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LegalFlow</title>
  <script>
    // SPA redirect for GitHub Pages
    // Stores the path and redirects to index so client-side routing can handle it
    sessionStorage.setItem('spa_redirect', window.location.pathname + window.location.search);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
