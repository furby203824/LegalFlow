<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LegalFlow</title>
  <script>
    // SPA redirect for GitHub Pages
    // Stores the original path and redirects to the app root
    var basePath = '/LegalFlow';
    var path = window.location.pathname;
    if (path.startsWith(basePath)) {
      path = path.slice(basePath.length);
    }
    sessionStorage.setItem('spa_redirect', path + window.location.search);
    window.location.replace(basePath + '/');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
